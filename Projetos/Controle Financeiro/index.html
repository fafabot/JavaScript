<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!--CSS-->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section class="container">
        <h1>Controle Financeiro</h1>

        <div class="resumo">
            <div class="entrada">
                <h3>Entrada</h3>
                <p id="totalEntrada">R$ 00.00</p>
            </div>
            <div class="saida">
                <h3>Saída</h3>
                <p id="totalSaida">R$ 00.00</p>
            </div>
            <div class="saldo">
                <h3>Saldo</h3>
                <p id="totalSaldo">R$ 00.00</p>
            </div>
        </div>

        <div class="estatisticas">
            <div class="stat-item entrada">
                <h3>Quantidade de Entradas</h3>
                <p id="qtdEntradas">0</p>
            </div>
            <div class="stat-item saida">
                <h3>Quantidade de Saídas</h3>
                <p id="qtdSaidas">0</p>
            </div>
            <div class="stat-item movimentacoes">
                <h3>Total de Movimentações</h3>
                <p id="totalMovimentacoes">0</p>
            </div>
        </div>


        <form id="formulario">
            <input type="text" id="descricao" placeholder="Descrição" required>
            <input type="number" id="valor" placeholder="Valor" required>
        
        <select id="tipo">
            <option value="entrada">Entrada</option>
            <option value="saida">Saída</option>
        </select>
        <button type="submit">Adicionar</button>
        </form>
        <ul id="listagem"></ul>

    </section>

     <!--JS-->
    <script src="script.js"></script>
</body>
</html>
