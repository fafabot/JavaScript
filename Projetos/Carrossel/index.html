<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrossel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Carrossel de Imagens</h1>

    <div class="carrossel">
        <img src="img/produto3-1.jpg" alt="Imagem 1" class="img ativa">
        <img src="img/produto3-2.jpg" alt="Imagem 2" class="img">
        <img src="img/produto3-3.jpg" alt="Imagem 3" class="img">
    </div>

    <div class="botoes">
        <button onclick="imagemAnterior()">Anterior</button>
        <button onclick="proximaImagem()">Próximo</button>
    </div>

    <script src="script.js"></script>

</body>
</html>
