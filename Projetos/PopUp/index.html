<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Popups</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Exercícios de Popup</h1>

    <button onclick="abrirLogin()">Popup de Login</button>

    <button onclick="popupConfirmacao()">Popup de Confirmação</button>

    <button onclick="mostrarCuriosidade()">Popup de Curiosidade</button>

    <button onclick="verificarSenha()">Popup de Aviso</button>

    <div class="imagem-container">
        <img src="img/imagem.jpg" alt="Imagem" onclick="abrirImagem()">
    </div>

    <div class="popup" id="popupLogin">
        <div class="conteudo-popup">
            <h2>Login</h2>
            <input type="text" placeholder="Usuário">
            <input type="password" placeholder="Senha">
            <button>Entrar</button>
            <button onclick="fecharLogin()">Fechar</button>
        </div>
    </div>

    <div class="popup" id="popupImagem">
        <div class="conteudo-popup imagem-popup">
            <img src="img/imagem.jpg" alt="Imagem Grande">
            <button onclick="fecharImagem()">Fechar</button>
        </div>
    </div>

    <script src="script.js"></script>

</body>
</html>
